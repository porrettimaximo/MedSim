<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSim - Sesiones</title>
  <link rel="stylesheet" href="/frontend-assets/styles.css" />
  <link rel="stylesheet" href="/frontend-assets/student_portal.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="app-header-main">
        <div class="brand-group">
          <a class="btn ghost" href="/frontend/student_join" aria-label="Volver"><span class="material-symbols-outlined">arrow_back</span></a>
          <div class="brand-copy"><h1 class="brand-title">MedSim</h1></div>
        </div>
        <div class="header-actions">
          <button id="btn-reload" class="btn primary" type="button">
            <span class="material-symbols-outlined">refresh</span>
            <span>Actualizar</span>
          </button>
        </div>
      </div>
    </header>
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>Sesiones</h2>
          <p>Entra a cualquiera de las sesiones disponibles o espera una activa desde la pantalla anterior.</p>
        </div>
        <div id="session-list-status">Cargando sesiones...</div>
      </div>
      <div class="panel-tools">
        <div class="search-wrap">
          <span class="material-symbols-outlined">search</span>
          <input id="search-sessions" type="search" placeholder="Buscar por alumno, paciente o evaluador" />
        </div>
        <div class="tool-meta">
          <span>Ver</span>
          <select id="page-size" class="page-size-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Alumno</th>
              <th>Paciente</th>
              <th>Evaluador</th>
              <th>Estado</th>
              <th style="text-align:right;">Accion</th>
            </tr>
          </thead>
          <tbody id="session-list">
            <tr><td colspan="5">Cargando sesiones...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="panel-foot">
        <div>ID de sesion: <strong id="session-id-label">MS-DELTA</strong></div>
        <div class="pagination">
          <button id="page-prev" class="btn" type="button">Anterior</button>
          <span id="page-indicator" class="pagination-status">Pagina 1 de 1</span>
          <button id="page-next" class="btn" type="button">Siguiente</button>
        </div>
      </div>
    </section>
  </div>
  <script src="/frontend-assets/student_sessions.js"></script>
</body>
</html>
