<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSim - Esperando conversacion</title>
  <link rel="stylesheet" href="/frontend-assets/styles.css" />
  <link rel="stylesheet" href="/frontend-assets/student_portal.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
  <style>
    .wait-shell { min-height:calc(100vh - 128px); display:flex; align-items:center; justify-content:center; }
    .wait-stack { width:min(760px, 100%); }
    .wait-card { background:var(--portal-surface-card); border-radius:24px; padding:40px 38px; position:relative; overflow:hidden; outline:1px solid var(--portal-ghost); }
    .wait-core { display:flex; flex-direction:column; align-items:center; text-align:center; gap:26px; }
    .spinner-wrap { position:relative; width:112px; height:112px; display:flex; align-items:center; justify-content:center; }
    .spinner-ring { width:112px; height:112px; border-radius:999px; border:4px solid rgba(0,55,75,.08); border-top-color:var(--portal-secondary); animation:spin 1.1s linear infinite; }
    .spinner-core { position:absolute; width:72px; height:72px; border-radius:999px; background:rgba(14,165,166,.08); display:flex; align-items:center; justify-content:center; animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite; }
    .spinner-core .material-symbols-outlined { font-size:34px; color:var(--portal-secondary); }
    h2 { margin:0; font-family:"Manrope",sans-serif; font-size:2.2rem; line-height:1.02; letter-spacing:-.03em; color:var(--portal-primary); }
    .lead { margin:0 auto; max-width:430px; color:var(--portal-soft); line-height:1.7; }
    .status-line { min-height:22px; font-size:.92rem; color:var(--portal-soft); text-align:center; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.55; transform:scale(1.05); } }
    @media (max-width:780px) { .wait-card { padding:28px 20px; } h2 { font-size:1.8rem; } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="app-header-main">
        <div class="brand-group">
          <a class="btn ghost" href="/frontend/index" aria-label="Salir"><span class="material-symbols-outlined">arrow_back</span></a>
          <div class="brand-copy"><h1 class="brand-title">MedSim</h1></div>
        </div>
        <div class="header-actions">
          <a href="/frontend/student_sessions" class="btn">
            <span class="material-symbols-outlined">list_alt</span>
  
          </a>
        </div>
      </div>
    </header>
    <main class="wait-shell">
      <div class="wait-stack">
        <section class="wait-card">
          <div class="wait-core">
            <div class="spinner-wrap">
              <div class="spinner-ring"></div>
              <div class="spinner-core"><span class="material-symbols-outlined">clinical_notes</span></div>
            </div>
            <div>
              <h2>Esperando conversacion activa...</h2>
              <br>
              <p class="lead">Cuando el evaluador inicie la sesion, entraras automaticamente a la ventana del estudiante.</p>
            </div>
            <div id="table-status" class="status-line"></div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="/frontend-assets/student_join.js"></script>
</body>
</html>
