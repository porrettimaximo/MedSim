<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSim - Alumnos</title>
  <link rel="stylesheet" href="/frontend-assets/styles.css" />
  <link rel="stylesheet" href="/frontend-assets/workspace.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
  <style>
    table.student-table td:first-child, table.student-table th:first-child { width:180px; }
    table.student-table td:last-child, table.student-table th:last-child { width:180px; text-align:right; }
    table.student-table .row-actions { justify-content:flex-end; }
    .modal { top:18vh; width:min(620px, calc(100vw - 24px)); }
    .modal-body { max-height:70vh; overflow:auto; }
    .form-group label { font-size:.95rem; font-weight:800; }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="app-header-main">
        <div class="brand-group"><a class="btn ghost" href="/frontend/index" aria-label="Salir"><span class="material-symbols-outlined">arrow_back</span></a><div class="brand-copy"><h1 class="brand-title">MedSim</h1></div></div>
        <nav class="nav-pills" aria-label="Navegacion del evaluador">
          <a class="nav-pill" href="/frontend/evaluator"><span>Conversaciones</span></a>
          <a class="nav-pill" href="/frontend/patients"><span>Pacientes</span></a>
          <a class="nav-pill active" href="/frontend/students"><span>Estudiantes</span></a>
        </nav>
      </div>
    </header>
    <div class="content-tools">
      <div class="search-wrap"><span class="material-symbols-outlined">search</span><input id="search-students" type="search" placeholder="Buscar por DNI o nombre" /></div>
      <div class="tool-actions"><button id="btn-new" class="btn primary" type="button"><span class="material-symbols-outlined">add</span><span>Nuevo estudiante</span></button></div>
    </div>
    <section class="panel">
      <div class="helper" id="list-status" hidden></div>
      <div class="table-wrap"><table class="student-table"><thead><tr><th>DNI</th><th>Estudiante</th><th style="text-align:right;">Acciones</th></tr></thead><tbody id="student-rows"><tr><td colspan="3" class="helper">Cargando alumnos...</td></tr></tbody></table></div>
      <div class="panel-foot">
        <div class="panel-meta">
          <p>Mostrando <strong id="stats-visible-count">0</strong> de <strong id="stats-total-count">0</strong> alumnos</p>
          <label for="page-size" class="helper">Ver</label>
          <select id="page-size" class="page-size-select">
            <option value="5">5</option>
            <option value="10" selected>10</option>
            <option value="20">20</option>
          </select>
        </div>
        <div class="pagination">
          <button id="page-prev" class="btn" type="button">Anterior</button>
          <span id="page-indicator" class="pagination-status">Pagina 1 de 1</span>
          <button id="page-next" class="btn" type="button">Siguiente</button>
        </div>
      </div>
    </section>
  </div>
  <div class="modal-overlay" id="modal-overlay"></div>
  <div class="modal" id="modal-student">
    <div class="modal-head">
      <div><h3>Alumno</h3><p>Carga el DNI y el nombre completo para dejarlo disponible en nuevas sesiones.</p></div>
      <div class="row-actions"><button id="btn-save" class="btn primary" type="button"><span class="material-symbols-outlined">save</span><span>Guardar</span></button><button class="btn" data-close type="button">Cerrar</button></div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label for="s-id">DNI</label><input id="s-id" class="mono" inputmode="numeric" placeholder="Solo numeros" /></div>
        <div class="form-group"><label for="s-name">Nombre completo</label><input id="s-name" placeholder="Nombre y apellido" /></div>
      </div>
      <div id="form-status" class="helper" style="margin-top:16px;"></div>
    </div>
  </div>
  <script src="/frontend-assets/students.js"></script>
</body>
</html>
