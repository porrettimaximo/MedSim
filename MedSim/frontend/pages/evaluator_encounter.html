<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSim - Evaluacion</title>
  <link rel="stylesheet" href="/frontend-assets/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
  <style>
    :root { --primary:#00374b; --primary-container:#0b4f68; --secondary:#0ea5a6; --secondary-container:#7df5f6; --surface:#d4e0e8; --surface-low:#c7d6e0; --surface-card:#f4f8fb; --surface-card-solid:#fff; --surface-high:#bed0db; --ink:#191c1e; --soft:#456072; --muted:#5e7b8f; --error:#ba1a1a; --ghost:rgba(11,79,104,.12); }
    * { box-sizing:border-box; }
    html, body { height:100%; }
    body { margin:0; height:100vh; overflow:hidden; background:linear-gradient(180deg, #c2d2dc 0%, var(--surface) 42%, #dfe9f0 100%); color:var(--ink); font-family:"Inter",sans-serif; }
    button, textarea, input { font:inherit; }
    .material-symbols-outlined { font-variation-settings:"FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24; }
    .page-shell { width:100%; height:100vh; margin:0; padding:0 18px 18px; display:flex; flex-direction:column; overflow:hidden; }
    .app-header { flex:0 0 auto; position:sticky; top:0; z-index:10; margin:0 -18px 18px; padding:10px 18px; background:#fff; backdrop-filter:blur(24px); }
    .app-header-main { display:flex; align-items:center; gap:20px; width:100%; min-height:56px; }
    .app-header-main,
    .eval-grid { max-width:1480px; margin:0 auto; width:100%; }
    .brand-group { display:flex; align-items:center; gap:16px; min-width:0; }
    .brand-title { margin:0; font-family:"Manrope",sans-serif; font-size:1.9rem; font-weight:800; letter-spacing:-.04em; color:var(--primary); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; min-height:40px; padding:10px 14px; border:none; border-radius:14px; background:var(--surface-card-solid); color:var(--ink); font-weight:700; text-decoration:none; cursor:pointer; box-shadow:0 0 0 1px var(--ghost); transition:.2s ease; }
    .btn:hover { transform:translateY(-1px); }
    .btn.ghost { width:40px; min-width:40px; min-height:40px; padding:0; background:transparent; color:var(--primary); box-shadow:none; }
    .btn.ghost:hover { background:rgba(11,79,104,.08); }
    .btn.primary { color:#fff; background:linear-gradient(135deg, var(--primary-container), var(--primary)); }
    .btn.primary:hover { filter:brightness(1.03); }
    .btn.danger { color:#fff; background:var(--error); box-shadow:none; }
    .btn.danger:hover { filter:brightness(.96); }
    .eval-grid { flex:1 1 auto; min-height:0; display:grid; grid-template-columns:minmax(0, 1.02fr) minmax(0, .98fr); gap:18px; }
    .eval-card { display:flex; flex-direction:column; min-height:0; height:100%; border-radius:24px; background:var(--surface-card); box-shadow:0 0 0 1px rgba(255,255,255,.5); overflow:hidden; }
    .eval-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:18px 20px 14px; }
    .eval-head-copy { min-width:0; }
    .eval-title { margin:0; font-family:"Manrope",sans-serif; font-size:1.45rem; font-weight:800; letter-spacing:-.02em; color:var(--primary); }
    .eval-small { margin-top:4px; color:var(--soft); font-size:.92rem; }
    .eval-row { display:flex; gap:6px; flex-wrap:nowrap; align-items:center; }
    .eval-row .btn { min-width:0; min-height:30px; padding:6px 8px; font-size:.76rem; border-radius:10px; gap:6px; }
    .eval-row .material-symbols-outlined { font-size:15px; }

    .transcript { flex:1 1 auto; min-height:0; overflow:auto; padding:0 10px 10px; }
    .tmsg { margin:0 10px 10px; padding:14px 16px; border-radius:16px; background:rgba(255,255,255,.9); color:var(--ink); }
    .tmsg.user { background:#e6f1f7; }
    .tmsg.playing { background:#dff7f7; }
    .tmeta { margin-bottom:6px; font-size:.72rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
    .message-audio-meta { display:flex; align-items:center; gap:10px; margin-top:10px; }
    .message-audio-status { font-size:.82rem; color:var(--soft); }
    .message-audio-replay { border:none; background:transparent; color:var(--primary); font-weight:700; cursor:pointer; padding:0; }
    .message-audio-replay:disabled { color:var(--muted); cursor:default; }

    .eval-body { flex:1 1 auto; min-height:0; overflow:auto; padding:0 10px 10px; }
    #segue-table-wrap { margin:0 10px; color:var(--soft); }
    table.eval-table { width:100%; border-collapse:separate; border-spacing:0 8px; }
    table.eval-table th, table.eval-table td { text-align:left; vertical-align:top; }
    table.eval-table td { padding:14px; background:rgba(255,255,255,.9); color:var(--ink); }
    table.eval-table tbody tr:hover td { background:#e6f1f7; }
    table.eval-table tbody td:first-child { border-radius:12px 0 0 12px; text-align:center; font-weight:800; color:var(--primary); }
    table.eval-table tbody td:last-child { border-radius:0 12px 12px 0; }
    table.eval-table .segue-area-row td { padding:18px 4px 8px; background:transparent; color:var(--primary); }
    table.eval-table .segue-area-row:hover td { background:transparent; }
    .segue-area-title { display:flex; align-items:center; gap:10px; font-family:"Manrope",sans-serif; font-size:1rem; font-weight:800; letter-spacing:-.02em; color:var(--primary); }
    .segue-area-title::before { content:""; width:30px; height:10px; border-radius:999px; background:linear-gradient(135deg, var(--secondary-container), var(--secondary)); flex:0 0 auto; }
    .radio-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-start; }
    .radio-row label { display:inline-flex; align-items:center; gap:6px; font-size:.9rem; color:var(--ink); }
    .obs-textarea { width:100%; min-height:84px; resize:vertical; border:none; border-radius:12px; background:#f4f9fc; color:var(--ink); padding:12px 14px; outline:none; box-shadow:inset 0 -2px 0 rgba(11,79,104,.08); }
    .obs-textarea:focus { background:#fff; box-shadow:inset 0 -2px 0 var(--secondary); }
    input[type="radio"] { accent-color:var(--secondary); }

    .mono { font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    @media (max-width:1180px) {
      .eval-grid { grid-template-columns:1fr; }
      body { height:auto; overflow:auto; }
      .page-shell { height:auto; min-height:100vh; overflow:visible; }
      .eval-card { min-height:auto; height:auto; }
      .transcript, .eval-body { max-height:58vh; }
    }

    @media (max-width:860px) {
      .page-shell { padding:0 10px 10px; }
      .app-header { margin:0 -10px 14px; padding:10px 10px; }
      .app-header-main, .eval-head { flex-direction:column; align-items:flex-start; }
      .eval-row { margin-left:0; flex-wrap:wrap; }
      .eval-row .btn { width:100%; justify-content:flex-start; }
      table.eval-table { min-width:760px; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="app-header-main">
        <div class="brand-group">
          <button id="btn-back" class="btn ghost" type="button" aria-label="Volver">
            <span class="material-symbols-outlined">arrow_back</span>
          </button>
          <h1 class="brand-title">MedSim</h1>
        </div>
      </div>
    </header>

    <main class="eval-grid">
      <section class="eval-card">
        <div class="eval-head">
          <div class="eval-head-copy">
            <h2 class="eval-title">Conversacion</h2>
            <div class="eval-small" id="status"></div>
          </div>
          <div class="eval-row">
            <button id="btn-open-student" class="btn" type="button">
              <span class="material-symbols-outlined">open_in_new</span>
              <span>Abrir link</span>
            </button>
            <button id="btn-finish" class="btn danger" type="button" disabled>
              <span class="material-symbols-outlined">stop_circle</span>
              <span>Finalizar conversacion</span>
            </button>
            <button id="btn-activate" class="btn primary" type="button">
              <span class="material-symbols-outlined">play_circle</span>
              <span>Activar conversacion</span>
            </button>
          </div>
        </div>
        <div class="transcript" id="transcript"></div>
      </section>

      <aside class="eval-card">
        <div class="eval-head">
          <div class="eval-head-copy">
            <h2 class="eval-title">Plantilla SEGUE</h2>
          </div>
          <div class="eval-row">
            <button id="btn-download-pdf" class="btn primary" type="button">
              <span class="material-symbols-outlined">download</span>
              <span>Descargar PDF</span>
            </button>
          </div>
        </div>
        <div class="eval-body">
          <div id="segue-table-wrap" class="eval-small">Cargando planilla...</div>
        </div>
      </aside>
    </main>
  </div>

  <script src="/frontend-assets/evaluator_encounter_contract.js"></script>
  <script src="/frontend-assets/evaluator_encounter_transcript.js"></script>
  <script src="/frontend-assets/evaluator_encounter.js"></script>
</body>
</html>
