<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedSim - Estudiante</title>
    <link rel="stylesheet" href="/frontend-assets/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700" rel="stylesheet" />
    <style>
        :root {
            --primary: #00374b;
            --primary-container: #0b4f68;
            --secondary: #0ea5a6;
            --surface: #f7f9fb;
            --surface-low: #eef5f9;
            --surface-card: rgba(255, 255, 255, 0.94);
            --surface-high: #dcebf4;
            --ink: #191c1e;
            --soft: #456072;
            --muted: #5e7b8f;
            --ghost: rgba(11, 79, 104, 0.12);
            --error: #ba1a1a;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #eef4f7 0%, var(--surface) 42%, #f9fbfc 100%);
            color: var(--ink);
            font-family: "Inter", sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            position: sticky;
            top: 0;
            z-index: 20;
            margin: 0 calc(50% - 50vw) 26px;
            padding: 10px max(24px, calc(50vw - 700px));
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(24px);
            border-bottom: none;
            height: auto;
            gap: 16px;
        }

        .icon-button {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--primary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .icon-button:hover {
            background: rgba(11, 79, 104, 0.08);
        }

        .icon-button.material-symbols-outlined {
            font-size: 26px;
            line-height: 1;
            text-decoration: none;
        }

        .icon {
            width: 20px;
            height: 20px;
            display: block;
            color: currentColor;
        }

        .app-title {
            font-family: "Manrope", sans-serif;
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--primary);
        }

        .main-grid {
            flex: 1;
            width: min(1400px, calc(100vw - 40px));
            margin: 0 auto;
            padding: 0 0 22px;
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
            gap: 18px;
            min-height: 0;
        }

        .chat-section,
        .clinical-section {
            min-height: 0;
        }

        .patient-bar {
            display: none;
        }

        .chat-container,
        .clinical-card {
            height: calc(100vh - 116px);
            min-height: 0;
            border-radius: 24px;
            background: var(--surface-low);
            overflow: hidden;
        }

        .chat-container {
            display: grid;
            grid-template-rows: 1fr auto auto;
            padding: 10px;
            gap: 10px;
        }

        .messages {
            min-height: 0;
            overflow: auto;
            padding: 6px;
            border-radius: 18px;
            background: transparent;
        }

        .message {
            border-radius: 18px;
            border: none;
            box-shadow: none;
        }

        .assistant-message {
            background: rgba(255, 255, 255, 0.92);
        }

        .user-message {
            background: #e6f1f7;
        }

        .text-panel,
        .control-panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 18px;
            border: none;
            box-shadow: none;
        }

        .text-panel {
            padding: 12px;
        }

        .text-message {
            border: none;
            border-radius: 14px;
            background: var(--surface-low);
            box-shadow: inset 0 -2px 0 rgba(11, 79, 104, 0.08);
            padding: 14px 16px;
            color: var(--ink);
        }

        .text-message:focus {
            outline: none;
            background: #fff;
            box-shadow: inset 0 -2px 0 var(--secondary);
        }

        .send-button,
        .config-button {
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary-container), var(--primary));
            color: #fff;
            font-weight: 800;
            cursor: pointer;
        }

        .send-button {
            min-width: 120px;
        }

        .control-panel {
            padding: 12px 14px;
            align-items: center;
        }

        .mic-button {
            border: none;
            background: rgba(11, 79, 104, 0.08);
            color: var(--primary);
        }

        .mic-button.recording {
            background: rgba(186, 26, 26, 0.12);
            color: var(--error);
        }

        .mic-hint,
        .status {
            color: var(--soft);
        }

        .clinical-card {
            display: grid;
            grid-template-rows: auto 1fr;
            padding: 10px;
            gap: 10px;
        }

        .clinical-title {
            margin: 0 0 10px;
            padding: 10px 14px 0;
            font-family: "Manrope", sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        .clinical-panel {
            flex: 1;
            min-height: 0;
            overflow: auto;
            border: none;
            border-radius: 18px;
            padding: 18px;
            background: rgba(255, 255, 255, 0.92);
        }

        .clinical-summary {
            margin-bottom: 16px;
            padding: 18px 18px 16px;
            border-radius: 20px;
            background: linear-gradient(180deg, #eef7fb, #e4f0f6);
        }

        .clinical-header {
            margin-bottom: 6px;
            font-family: "Manrope", sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .clinical-summary-meta {
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--soft);
        }

        .clinical-hint,
        .clinical-label {
            color: var(--soft);
        }

        .clinical-visible,
        .clinical-block {
            border: none;
            background: var(--surface-low);
            border-radius: 18px;
        }

        .clinical-visible {
            padding: 18px;
            margin-bottom: 14px;
        }

        .clinical-section-title {
            margin: 0 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: "Manrope", sans-serif;
            font-size: 1.02rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--primary);
        }

        .clinical-section-title::before {
            content: "";
            width: 28px;
            height: 10px;
            border-radius: 999px;
            background: linear-gradient(135deg, #7df5f6, var(--secondary));
            flex: 0 0 auto;
        }

        .clinical-value {
            font-size: 0.98rem;
            line-height: 1.65;
            color: var(--ink);
        }

        .clinical-block {
            padding: 14px 16px;
        }

        .clinical-grid {
            display: grid;
            grid-template-columns: minmax(120px, 0.9fr) minmax(0, 1.1fr);
            gap: 10px 16px;
        }

        .clinical-grid dt {
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .clinical-grid dd {
            margin: 0;
            color: var(--ink);
            font-weight: 600;
            line-height: 1.5;
        }

        .clinical-label {
            margin-bottom: 8px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .clinical-list {
            margin: 0;
            padding-left: 18px;
            color: var(--ink);
        }

        .clinical-list li + li {
            margin-top: 8px;
        }

        .clinical-allergy {
            display: inline-flex;
            align-items: center;
            min-height: 40px;
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(14, 165, 166, 0.1);
            color: var(--primary);
            font-weight: 700;
            line-height: 1.45;
        }

        .model-select {
            border: none;
            border-radius: 14px;
            background: #fff;
            box-shadow: inset 0 -2px 0 rgba(11, 79, 104, 0.08);
        }

        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
                width: min(100vw - 20px, 100%);
            }

            .chat-container,
            .clinical-card {
                height: auto;
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="app-header">
            <a class="icon-button material-symbols-outlined" href="/frontend/index" aria-label="Salir">arrow_back</a>
            <div class="app-title">MedSim</div>
        </header>

        <main class="main-grid">
            <section class="chat-section">
                <div id="patient-bar" class="patient-bar"></div>
                <div class="chat-container">
                    <div id="messages" class="messages"></div>
                    <div class="text-panel">
                        <input type="text" id="text-message" class="text-message" placeholder="Escribi al paciente y presiona Enter" />
                        <button id="send-button" class="send-button">Enviar</button>
                    </div>
                    <div class="control-panel">
                        <button id="mic-button" class="mic-button" type="button" title="Grabar/Detener" aria-label="Microfono">
                            <svg class="mic-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3Zm5-3a1 1 0 0 1 2 0a7 7 0 0 1-6 6.92V20h2a1 1 0 1 1 0 2H9a1 1 0 1 1 0-2h2v-2.08A7 7 0 0 1 5 11a1 1 0 1 1 2 0a5 5 0 0 0 10 0Z"/>
                            </svg>
                        </button>
                        <div id="mic-hint" class="mic-hint">Microfono listo para la conversación</div>
                        <div id="status" class="status">Listo</div>
                    </div>
                </div>
            </section>

            <aside class="clinical-section" aria-label="Ficha clinica">
                <div class="clinical-card">
                    <div class="clinical-title">Ficha clinica</div>
                    <div id="clinical-panel" class="clinical-panel">Elegi un paciente para ver sus datos clinicos.</div>
                </div>
            </aside>
        </main>
    </div>
    <script src="/frontend-assets/student_contract.js"></script>
    <script src="/frontend-assets/student_audio.js"></script>
    <script src="/frontend-assets/student.js"></script>
</body>
</html>
