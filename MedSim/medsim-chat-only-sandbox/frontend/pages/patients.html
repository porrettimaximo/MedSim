<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedSim - ABM Pacientes</title>
  <link rel="stylesheet" href="/frontend-assets/styles.css" />
  <style>
    body { background: linear-gradient(180deg, #f8fafc 0%, #eef2f6 100%); color: #0f172a; }
    .app-header { position:relative; display:flex; justify-content:center; align-items:center; padding: 20px 12px 10px; }
    .app-title { font-size: 32px; font-weight: 900; letter-spacing: .2px; color: #0b4f68; }
    .back-link { position:absolute; left: 12px; top: 50%; transform: translateY(-50%); }
    .wrap { width:min(1500px, 99vw); margin: 0 auto 18px; }

    .eval-card { background: #fff; border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 16px; overflow: hidden; box-shadow: 0 16px 40px rgba(15,23,42,0.06); }
    .eval-head { padding: 12px 14px; border-bottom: 1px solid rgba(15, 23, 42, 0.06); display:flex; gap:10px; align-items:center; justify-content:space-between; }
    .eval-body { padding: 14px; }
    .eval-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .eval-input, .eval-select, .eval-textarea { border: 1px solid rgba(15,23,42,0.14); border-radius: 12px; padding: 10px 12px; background: #fff; }
    .eval-textarea { width:100%; min-height: 110px; }
    .eval-btn { border: 1px solid rgba(15,23,42,0.14); background: #fff; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-weight: 800; color: #0f172a; text-decoration:none; display:inline-flex; align-items:center; gap:8px; }
    .eval-btn:hover { background: rgba(2, 132, 199, 0.06); border-color: rgba(2, 132, 199, 0.30); }
    .eval-btn.primary { background:#0ea5a6; border-color:#0ea5a6; color:#fff; }
    .eval-btn.primary:hover { background:#0b8f90; border-color:#0b8f90; }
    .eval-btn.danger { background:#b42318; border-color:#b42318; color:#fff; }
    .eval-btn.danger:hover { background:#9f1f16; border-color:#9f1f16; }
    .eval-small { font-size: 12px; opacity: .85; color:#475569; }
    .hint { font-size:12px; color:#64748b; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    table { width:100%; border-collapse: collapse; }
    th, td { border-top:1px solid rgba(15,23,42,0.10); padding:10px 8px; font-size: 13px; vertical-align: top; }
    th { font-size: 12px; color:#334155; text-align:left; }

    .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,.35); display:none; }
    .modal { position: fixed; top: 5vh; left:50%; transform: translateX(-50%); width:min(980px, 94vw); background:#fff; border-radius: 14px; border:1px solid #ddd; display:none; }
    .modal .eval-body { max-height: 82vh; overflow:auto; }
    .form-grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .form-group { display:flex; flex-direction:column; gap:4px; }
    .section-title { font-weight: 900; margin: 6px 0 8px; }
  </style>
</head>
<body>
  <header class="app-header">
    <a class="eval-btn back-link" href="/frontend/evaluator">&lt; Volver</a>
    <div class="app-title">MedSim</div>
  </header>

  <div class="wrap">
    <div class="eval-row" style="justify-content:flex-start; margin-bottom:12px;">
      <div class="eval-small">ABM Pacientes</div>
    </div>

    <section class="eval-card">
      <div class="eval-head">
        <div>
          <div style="font-weight:900;">Pacientes</div>
          <div class="eval-small" id="list-status"></div>
        </div>
        <div class="eval-row">
          <button id="btn-refresh" class="eval-btn" type="button">Reload</button>
          <button id="btn-new" class="eval-btn primary" type="button">Nuevo</button>
        </div>
      </div>
      <div class="eval-body" style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Paciente</th>
              <th>Región</th>
              <th>Motivo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="patient-rows">
            <tr><td colspan="5" class="eval-small">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <div class="modal-overlay" id="modal-overlay"></div>

  <div class="modal" id="modal-patient">
    <div class="eval-head">
      <div style="font-weight:900;">Paciente</div>
      <div class="eval-row">
        <button id="btn-delete" class="eval-btn danger" type="button">Eliminar</button>
        <button id="btn-save" class="eval-btn primary" type="button">Guardar</button>
        <button class="eval-btn" data-close type="button">Cerrar</button>
      </div>
    </div>
    <div class="eval-body">
      <div class="section-title">Identidad</div>
      <div class="form-grid">
        <div class="form-group">
          <label for="p-id">ID</label>
          <input id="p-id" class="eval-input mono" placeholder="p.ej. roberto_54" />
          <small class="hint">Identificador del archivo JSON (sin espacios).</small>
        </div>
        <div class="form-group">
          <label for="p-first">Nombre</label>
          <input id="p-first" class="eval-input" placeholder="Nombre" />
        </div>
        <div class="form-group">
          <label for="p-last">Apellido</label>
          <input id="p-last" class="eval-input" placeholder="Apellido" />
        </div>
        <div class="form-group">
          <label for="p-age">Edad</label>
          <input id="p-age" class="eval-input" inputmode="numeric" placeholder="Edad" />
        </div>
        <div class="form-group">
          <label for="p-region">Región</label>
          <input id="p-region" class="eval-input" placeholder="AMBA" />
        </div>
      </div>

      <div class="section-title" style="margin-top:16px;">Contexto clínico</div>
      <div class="form-grid">
        <div class="form-group" style="grid-column: 1 / -1;">
          <label for="p-chief">Motivo de consulta</label>
          <input id="p-chief" class="eval-input" placeholder="Frase inicial del paciente..." />
        </div>
        <div class="form-group">
          <label for="p-feel">¿Cómo se siente?</label>
          <input id="p-feel" class="eval-input" placeholder="Ej: Me siento mareado..." />
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label for="p-symptoms">Síntomas (1 por línea)</label>
          <textarea id="p-symptoms" class="eval-textarea" placeholder="- Dolor de cabeza\n- Mareos\n- Náuseas"></textarea>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label for="p-secret">Problema real (secreto del caso)</label>
          <textarea id="p-secret" class="eval-textarea" placeholder="Lo que el caso realmente tiene..."></textarea>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label for="p-display">Diagnóstico/verdad visible al final</label>
          <textarea id="p-display" class="eval-textarea" placeholder="Lo que se revela al finalizar..."></textarea>
        </div>
      </div>

      <div class="section-title" style="margin-top:16px;">Perfil de respuesta</div>
      <div class="form-grid">
        <div class="form-group">
          <label for="p-response-style">Conducta</label>
          <select id="p-response-style" class="eval-select">
            <option value="Calmado">Calmado</option>
            <option value="Nervioso">Nervioso</option>
            <option value="Confundido">Confundido</option>
            <option value="Irritable">Irritable</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-personality">Personalidad</label>
          <select id="p-personality" class="eval-select">
            <option value="Neutral">Neutral</option>
            <option value="Ansioso">Ansioso</option>
            <option value="Colaborativo">Colaborativo</option>
            <option value="Defensivo">Defensivo</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-language-level">Nivel de lenguaje</label>
          <select id="p-language-level" class="eval-select">
            <option value="A">A (simple)</option>
            <option value="B">B (intermedio)</option>
            <option value="C">C (técnico)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-memory-level">Recuerdo de historia clínica</label>
          <select id="p-memory-level" class="eval-select">
            <option value="Low">Bajo</option>
            <option value="Medium">Medio</option>
            <option value="High">Alto</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-cognitive">Confusión cognitiva</label>
          <select id="p-cognitive" class="eval-select">
            <option value="Normal">Normal</option>
            <option value="Leve">Leve</option>
            <option value="Moderada">Moderada</option>
            <option value="Alta">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label for="p-speaking-style">Estilo de habla</label>
          <select id="p-speaking-style" class="eval-select">
            <option value="rioplatense">Rioplatense</option>
            <option value="neutro">Neutro</option>
            <option value="formal">Formal</option>
          </select>
        </div>
      </div>

      <div id="form-status" class="eval-small" style="margin-top:12px;"></div>
    </div>
  </div>

  <script src="/frontend-assets/patients.js"></script>
</body>
</html>
